<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="420" height="250" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Each shape lives in a nominal 24×8 coordinate box; consumers apply scale+translate via <use>. -->
    <path id="fin" d="M 0,8 H 8 A 8,8 0 0 0 0,0 Z"/>
    <path id="fng" d="M 8,0 H 24 C 21,1 17,3 16,6 C 10,5 9,2 8,0 Z"/>
    <rect id="brk" width="24" height="8" rx="2"/>
    <path id="inf" d="M 8,0 C 6,0 4,2 4,4 S 6,8 8,8 S 14,0 16,0 S 20,2 20,4 S 18,8 16,8 S 10,0 8,0 Z"/>
    <path id="wav" d="M 8,8 H 24 C 22,8 22,2 20,2 S 18,6 16,6 S 14,4 12,4 S 10,8 8,8 Z"/>
    <path id="kel" d="M 12,0 C 8,0 6,2 5,4 C 5,7 4,8 0,8 V 0 Z"/>
    <path id="mnd" d="M 4,8 H 20 A 8,8 0 0 0 4,8 Z"/>

    <rect id="bb" width="96" height="32" fill="#ececec" stroke="#ff00ff" stroke-width="0.3" stroke-dasharray="1.5,1.5"/>
  </defs>

  <rect width="420" height="250" fill="#ffffff"/>

  <rect x="15" y="15" width="185" height="225" rx="10" fill="#f9f9f9" stroke="#bbb" stroke-width="0.5"/>
  <rect x="215" y="15" width="190" height="225" rx="10" fill="#f9f9f9" stroke="#bbb" stroke-width="0.5"/>
  <text x="32" y="36" font-family="sans-serif" font-size="14" font-style="italic" fill="#666">array 0</text>
  <text x="232" y="36" font-family="sans-serif" font-size="14" font-style="italic" fill="#666">array 1</text>

  <!-- ===== Array 0 ===== -->
  <use href="#bb"  x="92" y="50"/>
  <use href="#fin" transform="translate(92,50) scale(4)" fill="#c0c0c0"/>
  <text x="84" y="72" font-family="sans-serif" font-size="14" text-anchor="end" fill="#4d4d4d">fin</text>

  <use href="#bb"  x="92" y="93"/>
  <use href="#fng" transform="translate(92,93) scale(4)" fill="#c0c0c0"/>
  <text x="84" y="114" font-family="sans-serif" font-size="14" text-anchor="end" fill="#4d4d4d">fang</text>

  <use href="#bb"  x="92" y="134"/>
  <use href="#brk" transform="translate(92,134) scale(4)" fill="#c0c0c0"/>
  <text x="84" y="156" font-family="sans-serif" font-size="14" text-anchor="end" fill="#4d4d4d">brick</text>

  <use href="#bb"  x="92" y="176"/>
  <use href="#inf" transform="translate(92,176) scale(4)" fill="#c0c0c0"/>
  <text x="84" y="198" font-family="sans-serif" font-size="14" text-anchor="end" fill="#4d4d4d">inf</text>

  <!-- ===== Array 1 ===== -->
  <use href="#bb"  x="232" y="50"/>
  <use href="#wav" transform="translate(232,50) scale(4)" fill="#c0c0c0"/>
  <text x="336" y="72" font-family="sans-serif" font-size="14" text-anchor="start" fill="#4d4d4d">wave</text>

  <use href="#bb"  x="232" y="93"/>
  <text x="336" y="114" font-family="sans-serif" font-size="14" text-anchor="start" fill="#4d4d4d">hole</text>

  <use href="#bb"  x="232" y="134"/>
  <use href="#kel" transform="translate(232,134) scale(4)" fill="#c0c0c0"/>
  <text x="336" y="156" font-family="sans-serif" font-size="14" text-anchor="start" fill="#4d4d4d">keel</text>

  <use href="#bb"  x="232" y="176"/>
  <use href="#mnd" transform="translate(232,176) scale(4)" fill="#c0c0c0"/>
  <text x="336" y="198" font-family="sans-serif" font-size="14" text-anchor="start" fill="#4d4d4d">mound</text>
</svg>

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install system libs for cairosvg
        # cairosvg (a dev dependency) dlopens libcairo at import time; install
        # it so the SVG->PNG pixel-identity test actually runs rather than
        # skipping. The test still skips gracefully if this is ever absent.
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run tests
        # --locked fails if uv.lock is out of date with pyproject.toml, so CI
        # also proves the lockfile is current. --python pins the matrix version
        # (uv fetches a standalone interpreter as needed), so this is the proof
        # that the >=3.10 floor actually holds.
        run: uv run --locked --python ${{ matrix.python-version }} pytest

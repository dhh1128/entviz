name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Least privilege: CI only reads the checked-out code. No job needs write.
permissions:
  contents: read

# Actions pinned to full commit SHAs (a mutable @vN tag can be silently
# retargeted — the tj-actions class of attack). The trailing # vN.N.N comment
# is what humans and Dependabot read; Dependabot bumps the SHA and the comment
# together. persist-credentials: false so the checkout token isn't left on disk
# for later steps (none of them push).
jobs:
  # Reject invisible / Trojan-Source Unicode (GlassWorm & bidi-reorder classes)
  # before anything else runs. python3 ships on the runner, so no install step.
  unicode-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Scan for invisible / Trojan-Source Unicode
        run: python3 scripts/check_unicode.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Run tests
        # --locked fails if uv.lock is out of date with pyproject.toml, so CI
        # also proves the lockfile is current. --python pins the matrix version
        # (uv fetches a standalone interpreter as needed), so this is the proof
        # that the >=3.10 floor actually holds.
        run: uv run --locked --python ${{ matrix.python-version }} pytest

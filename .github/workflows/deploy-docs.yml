# Build the Zensical docs site and deploy it to GitHub Pages
# (https://dhh1128.github.io/entviz/).
#
# One-time setup (cannot be done by the workflow): in the repo,
# Settings -> Pages -> Source = "GitHub Actions". The first deploy fails
# without it.
#
# Actions pinned to full commit SHAs (a mutable @vN tag can be silently
# retargeted — the tj-actions class of attack); the # vN.N.N comment is what
# humans and Dependabot read. All resolve to node24 / composite runtimes
# (verified): checkout@v6.0.3, astral-sh/setup-uv@v7.6.0, configure-pages@v6.0.0,
# upload-pages-artifact@v5.0.0 (composite), deploy-pages@v5.0.0.
name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Default to read-only; the deploy job opts up to pages/id-token write below.
# Per-job permissions keep the test gate from holding the Pages deploy token.
permissions:
  contents: read

# One deploy at a time; let an in-progress deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate the deploy on a green suite so a docs-touching push to main can't
  # publish from a commit where the code tests are red. One interpreter is
  # enough here (the full matrix runs in ci.yml); --locked also proves uv.lock
  # is current.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          # Full history: the test gate runs tests/test_social_card.py, which
          # resolves the repo's root commit (git rev-list --max-parents=0) and
          # fails loudly on a shallow clone. ci.yml's checkout does the same.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --locked --python 3.12 pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # The Pages deploy uses the OIDC token + artifact, not the git token.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Build site with Zensical
        run: uv run --group docs zensical build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

# Build entviz and publish a GitHub Release when a v<x.y.z> tag is pushed.
#
# Cut releases with `uv run python scripts/release.py` (which bumps the version,
# regenerates the gallery, commits, tags, and pushes the tag). The pushed tag
# triggers this workflow.
#
# PyPI publishing is intentionally NOT wired up yet. When we are ready, add a
# second job using PyPI Trusted Publishing (OIDC) — mirror confer's publish.yml:
# pypa/gh-action-pypi-publish@release/v1 with `permissions: id-token: write` and
# a `pypi` environment, after registering the trusted publisher on PyPI.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to a full commit SHA (a mutable @vN tag can be silently
        # retargeted); # vN.N.N is what humans and Dependabot read.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # gh below authenticates via GH_TOKEN, not the persisted git token.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0

      - name: Build sdist and wheel
        run: uv build

      - name: Create GitHub Release
        # Pass the ref through env and reference "$TAG" rather than splicing
        # ${{ github.ref_name }} straight into the shell.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" dist/* --generate-notes

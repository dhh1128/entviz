<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="340" height="600" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Shapes in canonical 24×8 form (top-edge orientation) -->
    <path id="fin" d="M 0,8 H 8 A 8,8 0 0 0 0,0 Z"/>
    <path id="fng" d="M 8,0 H 24 C 21,1 17,3 16,6 C 10,5 9,2 8,0 Z"/>
    <rect id="brk" width="24" height="8" rx="2"/>
    <!-- Vertical brick for side edges (8×16 with same rounding radius 2) -->
    <rect id="brkv" width="8" height="16" rx="2"/>
    <path id="inf" d="M 8,0 C 6,0 4,2 4,4 S 6,8 8,8 S 14,0 16,0 S 20,2 20,4 S 18,8 16,8 S 10,0 8,0 Z"/>
    <path id="wav" d="M 8,8 H 24 C 22,8 22,2 20,2 S 18,6 16,6 S 14,4 12,4 S 10,8 8,8 Z"/>
    <path id="kel" d="M 12,0 C 8,0 6,2 5,4 C 5,7 4,8 0,8 V 0 Z"/>
    <path id="mnd" d="M 4,8 H 20 A 8,8 0 0 0 4,8 Z"/>

    <!-- Bounding-rect templates for top/bottom edges (24×8 scaled by 3 = 72×24) and side edges (8×16 scaled by 3 = 24×48) -->
    <rect id="bbh" width="72" height="24" fill="#ececec" stroke="#ff00ff" stroke-width="0.3" stroke-dasharray="1.5,1.5"/>
    <rect id="bbv" width="24" height="48" fill="#ececec" stroke="#ff00ff" stroke-width="0.3" stroke-dasharray="1.5,1.5"/>
  </defs>

  <rect width="340" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="170" y="20" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#333">shape rotations for non-canonical edges</text>

  <!-- Column headers -->
  <text x="105" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" font-style="italic" fill="#666">90° (right edge)</text>
  <text x="195" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" font-style="italic" fill="#666">180° (bottom)</text>
  <text x="280" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" font-style="italic" fill="#666">270° (left edge)</text>

  <!-- Each row: label + 3 rotated cells. Row stride 65. -->

  <!-- =========== fin =========== -->
  <text x="50" y="80" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">fin</text>
  <use href="#bbv" x="93" y="56"/>
  <use href="#fin" transform="translate(93,56) scale(3) rotate(90 4 4)" fill="#c0c0c0"/>
  <use href="#bbh" x="159" y="68"/>
  <use href="#fin" transform="translate(159,68) scale(3) rotate(180 12 4)" fill="#c0c0c0"/>
  <use href="#bbv" x="268" y="56"/>
  <use href="#fin" transform="translate(268,56) scale(3) translate(0 8) rotate(-90 4 4)" fill="#c0c0c0"/>

  <!-- =========== fang =========== -->
  <text x="50" y="145" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">fang</text>
  <use href="#bbv" x="93" y="121"/>
  <use href="#fng" transform="translate(93,121) scale(3) translate(-12 4) rotate(90 16 4)" fill="#c0c0c0"/>
  <use href="#bbh" x="159" y="133"/>
  <use href="#fng" transform="translate(159,133) scale(3) rotate(180 12 4)" fill="#c0c0c0"/>
  <use href="#bbv" x="268" y="121"/>
  <use href="#fng" transform="translate(268,121) scale(3) translate(-12 4) rotate(-90 16 4)" fill="#c0c0c0"/>

  <!-- =========== brick =========== -->
  <text x="50" y="210" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">brick</text>
  <use href="#bbv" x="93" y="186"/>
  <use href="#brkv" transform="translate(93,186) scale(3)" fill="#c0c0c0"/>
  <use href="#bbh" x="159" y="198"/>
  <use href="#brk" transform="translate(159,198) scale(3) rotate(180 12 4)" fill="#c0c0c0"/>
  <use href="#bbv" x="268" y="186"/>
  <use href="#brkv" transform="translate(268,186) scale(3)" fill="#c0c0c0"/>

  <!-- =========== inf =========== -->
  <text x="50" y="275" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">inf</text>
  <use href="#bbv" x="93" y="251"/>
  <use href="#inf" transform="translate(93,251) scale(3) translate(-8 4) rotate(90 12 4)" fill="#c0c0c0"/>
  <use href="#bbh" x="159" y="263"/>
  <use href="#inf" transform="translate(159,263) scale(3) rotate(180 12 4)" fill="#c0c0c0"/>
  <use href="#bbv" x="268" y="251"/>
  <use href="#inf" transform="translate(268,251) scale(3) translate(-8 4) rotate(-90 12 4)" fill="#c0c0c0"/>

  <!-- =========== wave =========== -->
  <text x="50" y="340" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">wave</text>
  <use href="#bbv" x="93" y="316"/>
  <use href="#wav" transform="translate(93,316) scale(3) translate(-12 4) rotate(90 16 4)" fill="#c0c0c0"/>
  <use href="#bbh" x="159" y="328"/>
  <use href="#wav" transform="translate(159,328) scale(3) rotate(180 12 4)" fill="#c0c0c0"/>
  <use href="#bbv" x="268" y="316"/>
  <use href="#wav" transform="translate(268,316) scale(3) translate(-12 4) rotate(-90 16 4)" fill="#c0c0c0"/>

  <!-- =========== hole =========== -->
  <text x="50" y="405" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">hole</text>
  <use href="#bbv" x="93" y="381"/>
  <use href="#bbh" x="159" y="393"/>
  <use href="#bbv" x="268" y="381"/>

  <!-- =========== keel =========== -->
  <text x="50" y="470" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">keel</text>
  <use href="#bbv" x="93" y="446"/>
  <use href="#kel" transform="translate(93,446) scale(3) translate(-2 2) rotate(90 6 4)" fill="#c0c0c0"/>
  <use href="#bbh" x="159" y="458"/>
  <use href="#kel" transform="translate(159,458) scale(3) rotate(180 12 4)" fill="#c0c0c0"/>
  <use href="#bbv" x="268" y="446"/>
  <use href="#kel" transform="translate(268,446) scale(3) translate(-2 6) rotate(-90 6 4)" fill="#c0c0c0"/>

  <!-- =========== mound =========== -->
  <text x="50" y="535" font-family="sans-serif" font-size="13" text-anchor="end" fill="#4d4d4d">mound</text>
  <use href="#bbv" x="93" y="511"/>
  <use href="#mnd" transform="translate(93,511) scale(3) translate(-8 4) rotate(90 12 4)" fill="#c0c0c0"/>
  <use href="#bbh" x="159" y="523"/>
  <use href="#mnd" transform="translate(159,523) scale(3) rotate(180 12 4)" fill="#c0c0c0"/>
  <use href="#bbv" x="268" y="511"/>
  <use href="#mnd" transform="translate(268,511) scale(3) translate(-8 4) rotate(-90 12 4)" fill="#c0c0c0"/>
</svg>

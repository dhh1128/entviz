<svg width="490" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Light gray page background -->
  <rect width="490" height="200" fill="#f0f0f0"/>

  <!-- Column labels -->
  <text x="110" y="22" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#444">Current</text>
  <text x="370" y="22" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#444">With nucleus wash</text>
  <line x1="240" y1="28" x2="240" y2="182" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== LEFT CELL (current design) =====
       Cell: (30,40)–(190,120)   e=20
       Nucleus: (50,60)–(170,100)  (6e×2e)
       Edge zones:
         edge 0 top-left:  (50,40)–(110,60)
         edge 1 top-right: (110,40)–(170,60)
         edge 2 right:     (170,60)–(190,100)
         edge 3 bot-right: (110,100)–(170,120)
         edge 4 bot-left:  (50,100)–(110,120)
         edge 5 left:      (30,60)–(50,100)
  -->
  <!-- white cell background -->
  <rect x="30" y="40" width="160" height="80" fill="white"/>
  <!-- nucleus -->
  <rect x="50" y="60" width="120" height="40" fill="#5abf51"/>
  <text x="110" y="80" font-family="monospace" font-size="15"
        text-anchor="middle" dominant-baseline="central" fill="white">Ub9a</text>
  <!-- edge 0: blue triangle (right angle bottom-left) -->
  <polygon points="50,40 50,60 110,60" fill="#2f3fbf"/>
  <!-- edge 1: gold filled rect -->
  <rect x="110" y="40" width="60" height="20" fill="#ffd966"/>
  <!-- edge 2: black double bars -->
  <rect x="170" y="72" width="20" height="6" fill="#000000"/>
  <rect x="170" y="88" width="20" height="6" fill="#000000"/>
  <!-- edge 3: blue triangle (right angle top-right) -->
  <polygon points="110,100 170,100 170,120" fill="#2f3fbf"/>
  <!-- edge 4: gold hook (bar along bottom + piece at left) -->
  <rect x="60" y="115" width="50" height="5" fill="#ffd966"/>
  <rect x="50" y="100" width="10" height="20" fill="#ffd966"/>
  <!-- edge 5: yellow horizontal bar (slant shape) -->
  <rect x="30" y="74" width="20" height="8" fill="#ffdf2f"/>

  <!-- ===== RIGHT CELL (nucleus wash) =====
       Cell:    (290,40)–(450,120)
       Nucleus: (310,60)–(430,100)
       Wash:    (300,50)–(440,110)  = nucleus extended outward by e/2=10
                inner 10px of each edge zone picks up nucleus color;
                outer 10px stays white
  -->
  <!-- white cell background -->
  <rect x="290" y="40" width="160" height="80" fill="white"/>
  <!-- WASH: nucleus rect extended by e/2 in every direction, low opacity -->
  <rect x="300" y="50" width="140" height="60" fill="#5abf51" opacity="0.38"/>
  <!-- nucleus (same exact bounds as left cell) -->
  <rect x="310" y="60" width="120" height="40" fill="#5abf51"/>
  <text x="370" y="80" font-family="monospace" font-size="15"
        text-anchor="middle" dominant-baseline="central" fill="white">Ub9a</text>
  <!-- same edge shapes, shifted +260 in x -->
  <polygon points="310,40 310,60 370,60" fill="#2f3fbf"/>
  <rect x="370" y="40" width="60" height="20" fill="#ffd966"/>
  <rect x="430" y="72" width="20" height="6" fill="#000000"/>
  <rect x="430" y="88" width="20" height="6" fill="#000000"/>
  <polygon points="370,100 430,100 430,120" fill="#2f3fbf"/>
  <rect x="320" y="115" width="50" height="5" fill="#ffd966"/>
  <rect x="310" y="100" width="10" height="20" fill="#ffd966"/>
  <rect x="290" y="74" width="20" height="8" fill="#ffdf2f"/>
  <!-- dashed outline marks where the wash rect boundary sits -->
  <rect x="300" y="50" width="140" height="60" fill="none"
        stroke="#3a8f35" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Annotations -->
  <text x="110" y="152" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#888">edge shapes float on plain white</text>

  <text x="370" y="150" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#3a8f35">dashed line = wash boundary (e/2 outside nucleus)</text>
  <text x="370" y="163" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#555">inner half of each edge zone: nucleus color</text>
  <text x="370" y="176" font-family="sans-serif" font-size="10"
        text-anchor="middle" fill="#555">outer half of each edge zone: white (unchanged)</text>
</svg>
